<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Randevou</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 15px; }
        .rdv-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #ce0000; }
    </style>
</head>
<body>
    <a href="dashboard-kliyan.html" style="color:#ce0000;">← Dashboard</a>
    <h2>ISTORIK MWEN</h2>
    <div id="user-rdv-list">Chaje...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const email = localStorage.getItem('user_email') || "";

        onValue(ref(db, 'randevou'), (snapshot) => {
            const container = document.getElementById('user-rdv-list');
            container.innerHTML = "";
            let kont = 0;
            snapshot.forEach(child => {
                const r = child.val();
                if(r.kliyan && r.kliyan.toLowerCase() === email.toLowerCase()) {
                    kont++;
                    container.innerHTML += `
                        <div class="rdv-card">
                            <strong>${r.sevis}</strong><br>
                            Dat: ${r.dat} | Lè: ${r.le}<br>
                            Status: Konfime
                        </div>
                    `;
                }
            });
            if(kont === 0) container.innerHTML = "Ou poko gen randevou.";
        });
    </script>
</body>
</html>
