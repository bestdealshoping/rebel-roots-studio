<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istwa Sèvis | Rebel Roots</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .servis-item { 
            background: var(--gri); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            border-left: 4px solid var(--wouj);
        }
        .date-badge { color: var(--wouj); font-size: 12px; font-weight: bold; }
        .empty-msg { text-align: center; color: #555; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; color: var(--wouj);">ISTWA SÈVIS MWEN</h2>
        <div id="lisServis"></div>
        <br>
        <a href="dashboard-kliyan.html" style="color: #888; text-decoration: none; display: block; text-align: center;">← Retounen</a>
    </div>

    <script>
        const istwa = JSON.parse(localStorage.getItem('istwaServis')) || [];
        const divLis = document.getElementById('lisServis');

        if(istwa.length === 0) {
            divLis.innerHTML = '<p class="empty-msg">Ou poko gen okenn sèvis nan istwa ou.</p>';
        } else {
            // Nou ranje yo pou pi nèf la parèt anlè (reverse)
            istwa.reverse().forEach(item => {
                divLis.innerHTML += `
                    <div class="servis-item">
                        <div class="date-badge">${item.dat} @ ${item.le}</div>
                        <div style="font-size: 18px; margin-top:5px;">${item.sevis}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
