<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres | Admin</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .box { background: var(--gri); padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; color: #888; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: var(--wouj); color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: var(--wouj); border-bottom: 1px solid #333; padding-bottom: 10px;">Pwofil Admin</h2>
        <form id="adminParamForm">
            <div class="input-group">
                <label>Non Pwofesyonèl:</label>
                <input type="text" id="pNon">
            </div>
            <div class="input-group">
                <label>Non Studio:</label>
                <input type="text" id="pStudio">
            </div>
            <div class="input-group">
                <label>Email Contact:</label>
                <input type="email" id="pEmail">
            </div>
            <button type="submit" class="btn-save">MIZE AJOU PWOFIL</button>
        </form>
        <a href="admin-dashboard.html" style="color:#555; text-decoration:none; display:block; text-align:center; margin-top:20px;">← Retounen nan Dashboard</a>
    </div>

    <script>
        // Chaje done ki te sove yo
        document.getElementById('pNon').value = localStorage.getItem('adminNon') || "";
        document.getElementById('pStudio').value = localStorage.getItem('adminStudio') || "";
        document.getElementById('pEmail').value = localStorage.getItem('adminEmail') || "";

        document.getElementById('adminParamForm').onsubmit = function(e) {
            e.preventDefault();
            localStorage.setItem('adminNon', document.getElementById('pNon').value);
            localStorage.setItem('adminStudio', document.getElementById('pStudio').value);
            localStorage.setItem('adminEmail', document.getElementById('pEmail').value);
            alert("Chanjman yo anrejistre!");
        };
    </script>
</body>
</html>
