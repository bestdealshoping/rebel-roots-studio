<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajoute Travay | Admin</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; padding: 20px; }
        .box { background: var(--gri); padding: 25px; border-radius: 15px; max-width: 450px; margin: auto; border: 1px solid #333; }
        label { display: block; margin-top: 15px; color: #888; font-size: 12px; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: var(--wouj); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color: var(--wouj); text-align: center;">POSTE YON REYALIZASYON</h2>
        <form id="addPortfolioForm">
            <label>LINK FOTO A (Kopye link la sou ImgBB):</label>
            <input type="text" id="fotoUrl" placeholder="https://i.ibb.co/..." required>
            
            <label>TIT TRAVAY LA (Dreadlocks, Tattoo, elatriye):</label>
            <input type="text" id="fotoTit" placeholder="Egz: Tattoo bra gòch" required>
            
            <button type="submit" class="btn-add">Mete l sou Site la</button>
        </form>
        <a href="admin-dashboard.html" style="display:block; text-align:center; margin-top:20px; color:#555; text-decoration:none;">Annuler</a>
    </div>

    <script>
        document.getElementById('addPortfolioForm').onsubmit = function(e) {
            e.preventDefault();
            const url = document.getElementById('fotoUrl').value;
            const tit = document.getElementById('fotoTit').value;

            let portfolio = JSON.parse(localStorage.getItem('rebelPortfolio')) || [];
            portfolio.push({ url: url, tit: tit });
            localStorage.setItem('rebelPortfolio', JSON.stringify(portfolio));

            alert("Reyalizasyon an pibliye sou sit la!");
            window.location.href = "portfolio.html";
        };
    </script>
</body>
</html>
