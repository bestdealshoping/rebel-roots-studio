<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Randevou</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 15px; }
        .rdv-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #ce0000; }
        .btn-del { background: #ce0000; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="admin-dashboard.html" style="color:#ce0000;">← Dashboard</a>
    <h2>LIST RANDEVOU</h2>
    <div id="rdv-list-admin">Chaje...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        onValue(ref(db, 'randevou'), (snapshot) => {
            const container = document.getElementById('rdv-list-admin');
            container.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const r = data[id];
                    container.innerHTML += `
                        <div class="rdv-card">
                            <strong>${r.kliyan}</strong><br>
                            Sèvis: ${r.sevis} | Lè: ${r.le}<br>
                            Dat: ${r.dat}
                            <button class="btn-del" onclick="efaseRdv('${id}')">EFASE</button>
                        </div>
                    `;
                });
            } else { container.innerHTML = "Pa gen randevou."; }
        });

        window.efaseRdv = (id) => {
            if(confirm("Efase randevou sa a?")) remove(ref(db, 'randevou/' + id));
        }
    </script>
</body>
</html>
