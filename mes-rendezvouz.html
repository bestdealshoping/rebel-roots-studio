<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randevou m yo | Rebel Roots</title>
    <style>
        :root {
            --nwa: #0a0a0a;
            --wouj: #ce0000;
            --blan: #ffffff;
            --gri: #1a1a1a;
        }
        body { background-color: var(--nwa); color: var(--blan); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .back-btn { color: var(--wouj); text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 20px; }
        .rdv-card {
            background: var(--gri);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--wouj);
        }
        .rdv-card h3 { margin: 0; color: var(--wouj); font-size: 18px; }
        .rdv-card p { margin: 5px 0; font-size: 14px; color: #ccc; }
        .status { font-weight: bold; font-size: 12px; color: #27ae60; text-transform: uppercase; }
    </style>
</head>
<body>

    <a href="dashboard-kliyan.html" class="back-btn">← Tounen nan Dashboard</a>
    <h2>ISTORIK <span style="color:var(--wouj)">RANDEVOU</span></h2>

    <div id="my-rdv-list">Chaje randevou w yo...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        
        const userEmail = localStorage.getItem('user_email');

        onValue(ref(db, 'randevou'), (snapshot) => {
            const container = document.getElementById('my-rdv-list');
            container.innerHTML = "";
            let hasRdv = false;

            snapshot.forEach((child) => {
                const r = child.val();
                // Filtre pou rale sèlman randevou ki gen imèl moun nan
                if(r.kliyan === userEmail) {
                    hasRdv = true;
                    container.innerHTML += `
                        <div class="rdv-card">
                            <h3>${r.sevis}</h3>
                            <p>📅 Dat: ${r.dat}</p>
                            <p>⏰ Lè: ${r.le}</p>
                            <div class="status">● Konfime</div>
                        </div>
                    `;
                }
            });

            if(!hasRdv) container.innerHTML = "<p style='color:#555;'>Ou poko gen okenn randevou.</p>";
        });
    </script>
</body>
</html>
