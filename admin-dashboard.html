<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Rebel Roots</title>
    <style>
        :root {
            --nwa: #0a0a0a;
            --wouj: #ce0000;
            --blan: #ffffff;
            --gri: #1a1a1a;
        }
        body {
            background-color: var(--nwa);
            color: var(--blan);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* SIDEBAR / MENU SLIDE */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1001;
            top: 0;
            left: 0;
            background-color: var(--gri);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
            border-right: 2px solid var(--wouj);
        }
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }
        .sidebar a:hover { color: var(--wouj); background: #222; }
        .sidebar .closebtn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
            color: var(--wouj);
        }

        /* TOP NAV */
        .topnav {
            background: var(--gri);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .openbtn {
            font-size: 25px;
            cursor: pointer;
            background-color: transparent;
            color: white;
            border: none;
        }

        /* KONTNI DASHBOARD */
        .main {
            padding: 20px;
            transition: margin-left .5s;
        }
        .welcome-section {
            background: linear-gradient(45deg, #111, #000);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid var(--wouj);
            margin-bottom: 25px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-card {
            background: var(--gri);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 2px solid var(--wouj);
        }
        .stat-card h3 { font-size: 12px; color: #888; margin: 0; }
        .stat-card p { font-size: 24px; font-weight: bold; margin: 10px 0 0; }

        .profile-preview {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: var(--wouj);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="avatar" style="margin: auto; width: 70px; height: 70px; font-size: 25px;">A</div>
            <p id="adminNameSidebar" style="margin-top: 10px; font-weight: bold;">Admin</p>
        </div>
        <a href="admin-dashboard.html">📊 Dashboard</a>
        <a href="jesyon-randevou.html">📅 Jesyon Randevou</a>
        <a href="jesyon-kliyan.html">👥 Jesyon Kliyan</a>
        
        <a href="ajoute-travay.html">🖼️ Ajoute nan Portfolio</a>

        <a href="statistik-avanse.html">📈 Statistik</a>
        <a href="parametre.html">⚙️ Paramèt</a>
        <a href="index.html" style="margin-top: 50px; color: #555;">Log Out</a>
    </div>

    <div class="topnav">
        <button class="openbtn" onclick="openNav()">&#9776;</button>
        <div style="margin-left: 20px; font-weight: bold;">REBEL ROOTS <span style="color:var(--wouj)">ADMIN</span></div>
    </div>

    <div id="main" class="main">
        <div class="welcome-section">
            <div class="profile-preview">
                <div class="avatar">A</div>
                <div>
                    <h2 style="margin:0; font-size: 18px;">Byenveni, <span id="adminNameDisplay">Admin</span>!</h2>
                    <p style="margin:0; font-size: 12px; color: #888;">Jodi a se <span id="currentDate"></span></p>
                </div>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <h3>KLIYAN TOTAL</h3>
                <p>12</p>
            </div>
            <div class="stat-card">
                <h3>RANDEVOU</h3>
                <p>05</p>
            </div>
            <div class="stat-card">
                <h3>VANT JODI A</h3>
                <p>$0.00</p>
            </div>
            <div class="stat-card">
                <h3>SÈVIS FINI</h3>
                <p>08</p>
            </div>
        </div>
    </div>

    <script>
        // Fonksyon pou Menu a
        function openNav() {
            document.getElementById("mySidebar").style.width = "250px";
            document.getElementById("main").style.marginLeft = "250px";
        }

        function closeNav() {
            document.getElementById("mySidebar").style.width = "0";
            document.getElementById("main").style.marginLeft= "0";
        }

        // Montre dat jodi a
        const d = new Date();
        document.getElementById("currentDate").innerText = d.toLocaleDateString();

        // Chèche info Admin (similasyon)
        const adminNon = localStorage.getItem('adminNon') || "Woldjy";
        document.getElementById('adminNameDisplay').innerText = adminNon;
        document.getElementById('adminNameSidebar').innerText = adminNon;
    </script>
</body>
</html>
