<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezèvasyon | Rebel Roots</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; padding: 20px; }
        .form-card { background: var(--gri); padding: 20px; border-radius: 15px; border-top: 5px solid var(--wouj); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn-reserve { background: var(--wouj); color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <a href="dashboard-kliyan.html" style="color:var(--wouj); text-decoration:none;">← Tounen</a>
    <div class="form-card">
        <h2>REZÈVE PLAS OU</h2>
        <select id="sevis">
            <option value="Tattoo">Tattoo</option>
            <option value="Dreadlocks">Dreadlocks</option>
            <option value="Coupe">Coupe Cheve</option>
            <option value="Piercing">Piercing</option>
        </select>
        <input type="date" id="dat">
        <select id="le">
            <option value="09:00 AM">09:00 AM</option>
            <option value="01:00 PM">01:00 PM</option>
            <option value="04:00 PM">04:00 PM</option>
        </select>
        <button class="btn-reserve" onclick="voyeRandevou()">KONFIME RANDEVOU</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TkH7PhX52xx2oF20ZTdt6uNftdE28ew",
            databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.voyeRandevou = function() {
            const dat = document.getElementById('dat').value;
            if (!dat) return alert("Chwazi yon dat!");

            const userEmail = localStorage.getItem('user_email') || "kliyan_anonyme@mail.com";
            const rdvRef = ref(db, 'randevou'); // BRANCH PRENSIPAL

            push(rdvRef, {
                kliyan: userEmail,
                sevis: document.getElementById('sevis').value,
                dat: dat,
                le: document.getElementById('le').value,
                status: "Pending",
                timestamp: Date.now()
            }).then(() => {
                alert("✅ Randevou Sove!");
                window.location.href = "dashboard-kliyan.html";
            }).catch(err => alert("Erè: " + err.message));
        }
    </script>
</body>
</html>
