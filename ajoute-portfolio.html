<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajoute Portfolio | Rebel Admin</title>
    <style>
        :root {
            --nwa: #0a0a0a;
            --wouj: #ce0000;
            --blan: #ffffff;
            --gri: #1a1a1a;
        }

        body {
            background-color: var(--nwa);
            color: var(--blan);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .back-link {
            color: var(--wouj);
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .form-container {
            background: var(--gri);
            padding: 25px;
            border-radius: 20px;
            border-top: 5px solid var(--wouj);
            max-width: 500px;
            margin: auto;
        }

        h2 { text-align: center; color: var(--wouj); margin-top: 0; }

        label { display: block; margin-top: 15px; font-size: 14px; color: #888; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--wouj); }

        .btn-post {
            background: var(--wouj);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            margin-top: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .preview-box {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        #img-preview {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid #333;
        }
    </style>
</head>
<body>

    <a href="admin-dashboard.html" class="back-link">← Tounen nan Dashboard</a>

    <div class="form-container">
        <h2>NOUVO TRAVAY</h2>
        
        <label>Lyen Foto a (URL)</label>
        <input type="text" id="img-url" placeholder="Kole lyen foto a la..." oninput="showPreview(this.value)">

        <div class="preview-box" id="preview-box">
            <p style="font-size: 12px; color:#555;">Preview:</p>
            <img src="" id="img-preview">
        </div>

        <label>Kategori Travay la</label>
        <select id="category">
            <option value="Tattoo">Tattoo (Atizay)</option>
            <option value="Dreadlocks">Dreadlocks (Rasin)</option>
            <option value="Coupe">Coupe (Style)</option>
            <option value="Piercing">Piercing</option>
        </select>

        <label>Tit oswa Deskripsyon</label>
        <input type="text" id="title" placeholder="Ex: Tattoo Lion bra dwat">

        <button class="btn-post" onclick="uploadToPortfolio()">PITE L SOU SIT LA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TkH7PhX52xx2oF20ZTdt6uNftdE28ew",
            authDomain: "rebel-roots-studio.firebaseapp.com",
            databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com",
            projectId: "rebel-roots-studio",
            appId: "1:860509135230:web:bae58f4c6ee5ee8dbbd32f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.uploadToPortfolio = function() {
            const url = document.getElementById('img-url').value;
            const cat = document.getElementById('category').value;
            const tit = document.getElementById('title').value;

            if(!url || !tit) {
                alert("Tanpri ranpli tout chan yo!");
                return;
            }

            const portfolioRef = ref(db, 'portfolio');
            push(portfolioRef, {
                url: url,
                kategori: cat,
                tit: tit,
                dat: new Date().toLocaleDateString()
            }).then(() => {
                alert("Travay la sove ak siksè! Kliyan yo ap wè l kounye a.");
                window.location.reload();
            }).catch((err) => alert("Erè: " + err.message));
        }

        // Preview foto a anvan w poste l
        window.showPreview = function(val) {
            const box = document.getElementById('preview-box');
            const img = document.getElementById('img-preview');
            if(val.includes('http')) {
                box.style.display = 'block';
                img.src = val;
            } else {
                box.style.display = 'none';
            }
        }
    </script>

</body>
</html>
