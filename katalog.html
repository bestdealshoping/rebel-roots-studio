<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalòg | Rebel Roots</title>
    <style>
        :root {
            --nwa: #0a0a0a;
            --wouj: #ce0000;
            --blan: #ffffff;
            --gri: #1a1a1a;
        }
        body {
            background-color: var(--nwa);
            color: var(--blan);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .grid-katalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .item-katalog {
            background: var(--gri);
            border-radius: 15px;
            padding: 30px 10px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .item-katalog:hover {
            border-color: var(--wouj);
            background: #222;
        }
        .icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--wouj);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <a href="dashboard-kliyan.html" class="back-btn">← Tounen</a>

    <header>
        <h1 style="margin:0; font-size: 24px;">NOUVO <span style="color:var(--wouj)">LOOK</span></h1>
        <p style="color:#888; font-size: 14px;">Chwazi kategori ki enterese w la</p>
    </header>

    <div class="grid-katalog">
        <a href="katalog-tattoo.html" class="item-katalog">
            <span class="icon">🎨</span>
            <strong>Tattoo</strong>
        </a>
        <a href="katalog-persing.html" class="item-katalog">
            <span class="icon">💎</span>
            <strong>Piercing</strong>
        </a>
        <a href="katalog-coupe.html" class="item-katalog">
            <span class="icon">✂️</span>
            <strong>Coupe Cheve</strong>
        </a>
        <a href="katalog-dread.html" class="item-katalog">
            <span class="icon">🦁</span>
            <strong>Dreadlocks</strong>
        </a>
    </div>

</body>
</html>
