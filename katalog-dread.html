<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalòg Dread Locks | Rebel Roots</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .back { color: #ce0000; text-decoration: none; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="katalog.html" class="back">← Retounen nan lis la</a>
    <h2 id="cat-title">Katalòg Dread Locks</h2>

    <div class="gallery" id="gallery-container">
        <p style="color:#555;">Chaje bèl travay yo...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        // NOU FILTRE PA KATEGORI (Chanje "Tattoo" pou lòt paj yo)
        const currentCategory = "Dreadlocks"; 

        onValue(ref(db, 'portfolio'), (snapshot) => {
            const container = document.getElementById('gallery-container');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const item = child.val();
                if(item.kategori === currentCategory) {
                    container.innerHTML += `<img src="${item.url}" alt="${item.tit}">`;
                }
            });
            if(container.innerHTML === "") container.innerHTML = "Pa gen foto pou kounye a.";
        });
    </script>
</body>
</html>
