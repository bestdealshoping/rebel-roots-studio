<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Rebel Roots</title>
    <style>
        :root {
            --nwa: #0a0a0a;
            --wouj: #ce0000;
            --blan: #ffffff;
            --gri: #1a1a1a;
        }

        body {
            background-color: var(--nwa);
            color: var(--blan);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--gri);
            padding: 30px 20px;
            border-bottom: 3px solid var(--wouj);
            text-align: center;
        }

        .welcome-msg { font-size: 18px; margin-bottom: 5px; }
        #display-name { color: var(--wouj); font-weight: bold; font-size: 24px; text-transform: capitalize; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .menu-item {
            background: var(--gri);
            padding: 25px 10px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .menu-item:active { transform: scale(0.95); background: #222; }

        .icon { font-size: 30px; display: block; margin-bottom: 10px; }

        .logout-btn {
            display: block;
            margin: 20px auto;
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="welcome-msg">Bonjou,</div>
        <div id="display-name">Chaje...</div>
    </header>

    <div class="menu-grid">
        <a href="rezervasyon.html" class="menu-item">
            <span class="icon">📅</span>
            <strong>Rezève Plas</strong>
        </a>
        <a href="katalog-main.html" class="menu-item">
            <span class="icon">🎨</span>
            <strong>Katalòg</strong>
        </a>
        <a href="mes-rendezvous.html" class="menu-item">
            <span class="icon">📜</span>
            <strong>Randevou m yo</strong>
        </a>
        <a href="profil.html" class="menu-item">
            <span class="icon">👤</span>
            <strong>Profil Mwen</strong>
        </a>
    </div>

    <a href="#" class="logout-btn" onclick="dekonekte()">Dekonekte</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TkH7PhX52xx2oF20ZTdt6uNftdE28ew",
            databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // 1. TCHEKE SI MOUN NAN KONEKTE & RALE NON LI
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userKey = user.email.replace(/[.$#[\]]/g, "_");
                onValue(ref(db, 'kliyan_yo/' + userKey), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('display-name').innerText = data.nom;
                        // Sove nan memwa pou lòt paj yo ka itilize l
                        localStorage.setItem('user_nom', data.nom);
                        localStorage.setItem('user_email', data.email);
                        localStorage.setItem('user_tel', data.tel);
                    }
                });
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. FONKSYON DEKONEKTE
        window.dekonekte = function() {
            signOut(auth).then(() => {
                localStorage.clear();
                window.location.href = "login.html";
            });
        }
    </script>
</body>
</html>
