<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kliyan | Rebel Roots Studio</title>
    <style>
        :root {
            --nwa: #0a0a0a;
            --wouj: #ce0000;
            --blan: #ffffff;
            --gri: #1a1a1a;
        }
        body {
            background-color: var(--nwa);
            color: var(--blan);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .container {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }
        .welcome-card {
            background: linear-gradient(45deg, var(--gri), #000);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--wouj);
            margin-top: 50px;
        }
        .welcome-card h2 {
            margin: 0;
            font-size: 24px;
        }
        .user-name {
            color: var(--wouj);
            display: block;
            font-size: 30px;
            margin-top: 10px;
        }
        .menu-options {
            margin-top: 40px;
        }
        .option-btn {
            background: var(--gri);
            border-left: 5px solid var(--wouj);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .option-btn:hover {
            background: #252525;
        }
        .status-badge {
            background: #222;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #888;
        }
        .logout {
            display: block;
            text-align: center;
            margin-top: 50px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
    <h2>Byenveni nan fanmi an,</h2>
    <span id="displayNon" class="user-name">Kliyan</span>
    <p style="color: #888;">Pran yon nouvo imaj jodi a.</p>
</div>

<script>
    // Chèche non ki te sove a
    const nonSove = localStorage.getItem('userNon');
    if(nonSove) {
        document.getElementById('displayNon').innerText = nonSove;
    }
</script>

        <div class="menu-options">
            <a href="rezervasyon.html" class="option-btn">
                <span>📅 Fè yon rezèvasyon</span>
                <span style="color: var(--wouj);">➔</span>
            </a>
            
          <a href="istwa-servis.html" class="option-btn">
    <span>📜 Istwa sèvis mwen yo</span>
    <span id="kont_servis" class="status-badge">0 sèvis</span>
</a>

<script>
    // Mizajou kontè sèvis la sou dashboard la
    const istwa = JSON.parse(localStorage.getItem('istwaServis')) || [];
    document.getElementById('kont_servis').innerText = `${istwa.length} sèvis`;
    
    // Non pèsonalize a (si l te sove nan enskripsyon)
    const nonSove = localStorage.getItem('userNon');
    if(nonSove) document.getElementById('displayNon').innerText = nonSove;
</script>

            
            <a href="modifye-pwofil.html" class="option-btn">
                <span>👤 Modifye pwofil mwen</span>
                <span>⚙️</span>
            </a>
        </div>

        <a href="index.html" class="logout">Dekonekte</a>
    </div>

</body>
</html>
