<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Rebel Roots</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        h2 { text-align: center; color: var(--wouj); text-transform: uppercase; margin-bottom: 30px; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .gallery-item {
            background: var(--gri);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .desc { padding: 10px; font-size: 13px; text-align: center; color: #eee; font-weight: bold; }
        .back-home { display: block; text-align: center; margin-top: 40px; color: var(--wouj); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Nouvo Reyalizasyon</h2>

    <div class="gallery" id="portfolioGallery">
        <!-- Foto yo ap parèt isit la otomatikman -->
    </div>

    <a href="index.html" class="back-home">← TOUNEN NAN AKÈY</a>

    <script>
        // Nou rale foto ki sove yo nan memwa a
        const fotoYo = JSON.parse(localStorage.getItem('rebelPortfolio')) || [];
        const gallery = document.getElementById('portfolioGallery');

        if(fotoYo.length === 0) {
            gallery.innerHTML = "<p style='text-align:center; color:#555; width:100%; grid-column: 1/-1;'>Okenn foto poko disponib.</p>";
        } else {
            fotoYo.reverse().forEach(foto => {
                gallery.innerHTML += `
                    <div class="gallery-item">
                        <img src="${foto.url}" alt="Travay Rebel Roots">
                        <div class="desc">${foto.tit}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
