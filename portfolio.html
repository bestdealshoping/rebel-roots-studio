<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Rebel Roots</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        h2 { text-align: center; color: var(--wouj); text-transform: uppercase; margin-bottom: 30px; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .gallery-item {
            background: var(--gri);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .desc { padding: 10px; font-size: 13px; text-align: center; color: #eee; font-weight: bold; }
        .back-home { display: block; text-align: center; margin-top: 40px; color: var(--wouj); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Nouvo Reyalizasyon</h2>

    <div class="gallery" id="portfolioGallery">
        <!-- Foto yo ap parèt isit la otomatikman -->
    </div>

    <a href="index.html" class="back-home">← TOUNEN NAN AKÈY</a>

    <script>
    const gallery = document.getElementById('portfolioGallery');
    const fotoYo = JSON.parse(localStorage.getItem('rebelPortfolio')) || [];

    gallery.innerHTML = ""; // Netwaye galri a

    if (fotoYo.length === 0) {
        gallery.innerHTML = "<p style='text-align:center; color:#555;'>Okenn foto poko disponib.</p>";
    } else {
        // Nou fè yon kopi epi nou ranvèse l pou pi nèf la parèt anlè
        fotoYo.slice().reverse().forEach(foto => {
            // Kreye eleman yo youn pa youn pou evite erè guillemets
            const item = document.createElement('div');
            item.className = 'gallery-item';

            const img = document.createElement('img');
            // Si link la pa kòmanse ak http, li p ap chaje l pou evite erè
            img.src = foto.url.startsWith('http') ? foto.url : 'https://via.placeholder.com/300?text=Move+Link';
            img.alt = "Travay Rebel Roots";

            const desc = document.createElement('div');
            desc.className = 'desc';
            desc.innerText = foto.tit;

            item.appendChild(img);
            item.appendChild(desc);
            gallery.appendChild(item);
        });
    }
</script>

</body>
</html>
