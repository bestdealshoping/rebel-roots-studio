<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rebel Roots</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .login-card { background: #1a1a1a; padding: 30px; border-radius: 15px; max-width: 350px; margin: auto; border-bottom: 3px solid #ce0000; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; }
        .btn { background: #ce0000; color: white; padding: 12px; width: 95%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        a { color: #ce0000; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 style="color:#ce0000">KONEKTE</h2>
        <input type="email" id="email" placeholder="Imèl ou">
        <input type="password" id="password" placeholder="Modpas ou">
        <button class="btn" onclick="fèLogin()">ANTRE</button>
        <p style="margin-top:20px;">Ou pa gen kont? <a href="enskripsyon.html">Enskri la</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TkH7PhX52xx2oF20ZTdt6uNftdE28ew",
            authDomain: "rebel-roots-studio.firebaseapp.com",
            projectId: "rebel-roots-studio",
            appId: "1:860509135230:web:bae58f4c6ee5ee8dbbd32f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.fèLogin = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    localStorage.setItem('rebel_session', 'active');
                    window.location.href = "dashboard-kliyan.html";
                })
                .catch((err) => alert("Erè: " + err.message));
        }
    </script>
</body>
</html>
