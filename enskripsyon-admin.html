<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | Rebel Roots</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: var(--gri); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--wouj); text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-reg { background: var(--wouj); color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: var(--wouj);">KREYE KONT ADMIN</h2>
        <form id="adminRegForm">
            <input type="text" id="aNon" placeholder="Non Pwofesyonèl ou" required>
            <input type="text" id="aStudio" placeholder="Non Studio a (ex: Rebel Roots)" required>
            <input type="email" id="aEmail" placeholder="Email Admin" required>
            <input type="password" id="aPass" placeholder="Modpas Sekirite" required>
            <button type="submit" class="btn-reg">AKTIVE DASHBOARD</button>
        </form>
    </div>

    <script>
        document.getElementById('adminRegForm').onsubmit = function(e) {
            e.preventDefault();
            localStorage.setItem('adminNon', document.getElementById('aNon').value);
            localStorage.setItem('adminStudio', document.getElementById('aStudio').value);
            localStorage.setItem('adminEmail', document.getElementById('aEmail').value);
            alert("Kont Admin kreye ak siksè!");
            window.location.href = "admin-dashboard.html";
        };
    </script>
</body>
</html>
