<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enskripsyon | Rebel Roots</title>
    <style>
        :root { --nwa: #0a0a0a; --wouj: #ce0000; --gri: #1a1a1a; }
        body { background: var(--nwa); color: white; font-family: sans-serif; padding: 20px; }
        .box { background: var(--gri); padding: 20px; border-radius: 15px; border-top: 5px solid var(--wouj); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        button { background: var(--wouj); color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>KREYE KONT OU</h2>
        <input type="text" id="nom" placeholder="Non Konplè">
        <input type="tel" id="tel" placeholder="Telefòn">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="enskri()">KREYE KONT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TkH7PhX52xx2oF20ZTdt6uNftdE28ew",
            databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.enskri = function() {
            const nom = document.getElementById('nom').value;
            const tel = document.getElementById('tel').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if(!nom || !tel || !email || !pass) return alert("Ranpli tout chan yo!");

            createUserWithEmailAndPassword(auth, email, pass)
            .then((userCredential) => {
                const user = userCredential.user;
                // Netwaye email pou itilize kòm kle
                const userKey = email.replace(/[.$#[\]]/g, "_");

                // SOVE ENFO YO NAN DATABASE LA
                set(ref(db, 'kliyan_yo/' + userKey), {
                    nom: nom,
                    tel: tel,
                    email: email,
                    uid: user.uid
                }).then(() => {
                    // Sove nan memwa telefòn nan pou Dashboard la ka wè l
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('user_nom', nom);
                    alert("Kont ou kreye ak siksè!");
                    window.location.href = "dashboard-kliyan.html";
                });
            })
            .catch(err => alert("Erè: " + err.message));
        }
    </script>
</body>
</html>
