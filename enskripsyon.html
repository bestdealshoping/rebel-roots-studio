<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enskri | Rebel Roots Studio</title>
    <style>
        :root {
            --nwa: #0a0a0a;
            --wouj: #ce0000;
            --blan: #ffffff;
            --gri: #1a1a1a;
        }
        body {
            background-color: var(--nwa);
            color: var(--blan);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .register-container {
            background: var(--gri);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(206, 0, 0, 0.2);
            border: 1px solid #333;
            text-align: center;
        }
        h2 { color: var(--wouj); margin-bottom: 20px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--wouj); outline: none; }
        .btn-register {
            background: var(--wouj);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
        }
        .toggle-link {
            margin-top: 15px;
            font-size: 14px;
            display: block;
            color: #bbb;
            text-decoration: none;
        }
        .toggle-link span { color: var(--wouj); font-weight: bold; }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>KREYE YON KONT</h2>
        <p style="font-size: 13px; color: #888;">Antre nan fanmi Rebel Roots la</p>
        
        <form id="regForm">
    <input type="text" id="regNon" placeholder="Non konplè" required>
    <input type="tel" id="regTel" placeholder="Nimewo Telefòn" required>
    <input type="text" id="regAdres" placeholder="Adrès ou (Vil/Zòn)" required>
    <input type="email" id="regEmail" placeholder="Email" required>
    <input type="password" id="regPass" placeholder="Kreye yon modpas" required>
    <button type="submit" class="btn-register">ENSKRI MWEN</button>
</form>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD1TkH7PhX52xx2oF20ZTdt6uNftdE28ew",
    authDomain: "rebel-roots-studio.firebaseapp.com",
    databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com",
    projectId: "rebel-roots-studio",
    storageBucket: "rebel-roots-studio.firebasestorage.app",
    messagingSenderId: "860509135230",
    appId: "1:860509135230:web:bae58f4c6ee5ee8dbbd32f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Fonksyon pou sove kliyan an
  window.saveKliyan = function(non, telefon) {
    const kliyanRef = ref(db, 'kliyan_yo');
    const nouvoKliyan = push(kliyanRef);
    set(nouvoKliyan, {
      nom: non,
      tel: telefon,
      dat: new Date().toISOString()
    }).then(() => {
      localStorage.setItem('rebel_session', 'active'); // Sove sesyon an lokalman tou
      alert("Enskripsyon reyisi!");
      window.location.href = "dashboard-kliyan.html";
    });
  }
</script>



        <a href="login.html" class="toggle-link">Ou gen yon kont deja? <span>Konekte la</span></a>
    </div>

</body>
</html>
