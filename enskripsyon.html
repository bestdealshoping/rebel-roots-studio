<!DOCTYPE html>
<html lang="hc">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enskripsyon | Rebel Roots</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; max-width: 350px; margin: auto; border-bottom: 3px solid #ce0000; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; }
        .btn { background: #ce0000; color: white; padding: 12px; width: 95%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#ce0000">KREYE KONT</h2>
        <input type="text" id="nom" placeholder="Non konplè">
        <input type="email" id="email" placeholder="Imèl">
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="password" placeholder="Modpas">
        <button class="btn" onclick="enskriKliyan()">ENSRKI KOUNYA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1TkH7PhX52xx2oF20ZTdt6uNftdE28ew",
            authDomain: "rebel-roots-studio.firebaseapp.com",
            databaseURL: "https://rebel-roots-studio-default-rtdb.firebaseio.com",
            projectId: "rebel-roots-studio",
            appId: "1:860509135230:web:bae58f4c6ee5ee8dbbd32f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.enskriKliyan = function() {
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const tel = document.getElementById('tel').value;
            const password = document.getElementById('password').value;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCred) => {
                    // Sove enfòmasyon yo nan Database la pou Admin
                    set(ref(db, 'kliyan_yo/' + userCred.user.uid), {
                        nom: nom,
                        tel: tel,
                        email: email,
                        dat: new Date().toLocaleDateString()
                    }).then(() => {
                        localStorage.setItem('rebel_session', 'active');
                        window.location.href = "dashboard-kliyan.html";
                    });
                })
                .catch((err) => alert("Erè: " + err.message));
        }
    </script>
</body>
</html>
